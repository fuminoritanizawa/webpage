# ============================================================
# config/_default/languages.toml
# PURPOSE: Language configuration for the site
# ROLE: Defines available languages; currently English only
# CLASSIFICATION: Safe to edit
# NOTE: Multi-language support is pre-stubbed but disabled.
#       To add a language, uncomment the relevant block and move
#       content into a language sub-folder (e.g. content/en/).
# ============================================================
#
# Languages
#   Create a `[X]` block for each language you want, where X is the language ID.
#   Refer to https://sourcethemes.com/academic/docs/language/

# Configure the English version of the site.
[en]
  languageCode = "en-us"
