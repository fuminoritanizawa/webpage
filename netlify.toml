# ============================================================
# netlify.toml
# PURPOSE: Netlify deployment and build configuration
# ROLE: Specifies the Hugo build command, output directory, and HTTP headers
# CLASSIFICATION: Safe to edit with caution
# NOTE: HUGO_VERSION must match the version used for local builds.
#       Local: 0.109.0 (verified clean). Updated from 0.72.0 on 2026-04-01
#       after confirming the Academic submodule (commit 0db000a8) builds
#       without errors at this version.
# COMMON EDITS: Keep HUGO_VERSION in sync with local `hugo version` output.
# ============================================================

[build]
  command = "hugo --gc --minify -b $URL"
  publish = "public"

[build.environment]
  HUGO_VERSION = "0.109.0"
  HUGO_ENABLEGITINFO = "true"

[context.production.environment]
  HUGO_ENV = "production"

[context.deploy-preview]
  command = "hugo --gc --minify --buildFuture -b $DEPLOY_PRIME_URL"

[context.branch-deploy]
  command = "hugo --gc --minify -b $DEPLOY_PRIME_URL"

[[headers]]
  for = "*.webmanifest"
  [headers.values]
    Content-Type = "application/manifest+json; charset=UTF-8"

[[headers]]
  for = "index.xml"
  [headers.values]
    Content-Type = "application/rss+xml"
